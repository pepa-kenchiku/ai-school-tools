<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考城建築科 AIランチャー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sidebar-width: 260px;
      --bg: #0f1117;
      --bg-main: #1a1b23;
      --bg-sidebar: #14151d;
      --bg-card: #1e1f2a;
      --text: #e4e4e7;
      --text-dim: #8b8b97;
      --border: #2a2b35;
      --accent: #2563eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* === Sidebar === */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
    }

    .sidebar-header p {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .section-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 14px 24px 6px;
    }

    .skill-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 12px;
    }

    .skill-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 14px;
      margin-bottom: 4px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .skill-btn:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--border);
    }

    .skill-btn.active {
      border-color: var(--active-color, #4a9eff);
      background: rgba(255,255,255,0.06);
    }

    .skill-icon {
      font-size: 24px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .skill-info { flex: 1; min-width: 0; }

    .skill-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .skill-subtitle {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* External tools */
    .external-section {
      padding: 0 10px 12px;
    }

    .external-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 4px;
      border-radius: 8px;
      background: transparent;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.2s;
    }

    .external-btn:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .external-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
    }

    /* === Main Area === */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-main);
      overflow-y: auto;
    }

    /* Welcome */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--text-dim);
      padding: 40px;
    }

    .welcome-screen .icon { font-size: 72px; margin-bottom: 16px; opacity: 0.4; }

    .welcome-screen h2 {
      font-size: 22px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome-screen p { font-size: 14px; line-height: 1.7; }

    /* Skill Detail */
    .skill-detail {
      display: none;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 32px;
      width: 100%;
    }

    .skill-detail.visible { display: block; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .detail-header-icon {
      font-size: 40px;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
    }

    .detail-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .detail-header p {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .detail-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .action-btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .action-btn.primary {
      background: var(--accent);
      color: white;
    }

    .action-btn.primary:hover { background: #1d4ed8; }

    .action-btn.secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .action-btn.secondary:hover { background: rgba(255,255,255,0.12); }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card ul {
      list-style: none;
      padding: 0;
    }

    .card li {
      font-size: 13px;
      color: var(--text-dim);
      padding: 5px 0;
      padding-left: 16px;
      position: relative;
      line-height: 1.5;
    }

    .card li::before {
      content: "›";
      position: absolute;
      left: 0;
      color: var(--text-dim);
    }

    .card.full-width {
      grid-column: 1 / -1;
    }

    .example-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .example-q {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-q:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #22c55e;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Responsive */
    @media (max-width: 900px) {
      .card-grid { grid-template-columns: 1fr; }
      .detail-actions { flex-direction: column; }
    }

    @media (max-width: 768px) {
      .sidebar { width: 220px; min-width: 220px; }
    }

    @media (max-width: 600px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-width: 100%;
        height: auto;
        max-height: 40vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .skill-list {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        padding: 4px 8px;
      }
      .skill-btn {
        flex: 1 1 calc(50% - 4px);
        min-width: 130px;
        padding: 10px;
        margin-bottom: 0;
      }
      .main { height: 60vh; }
      .skill-detail { padding: 20px 16px; }
      .detail-header { flex-direction: column; text-align: center; }
      .detail-actions { margin-left: 0; }
    }
  </style>
</head>

        capabilities: [
          { title: "テーマ・コンセプト", items: ["テーマ文の本質的な問いを抽出", "複数のコンセプト方向性を提示", "地域の課題・文化から設計の種を発見"] },
          { title: "審査員視点", items: ["テーマ理解度・具体性・独創性・表現力で評価", "「審査員がここで止まる」を具体的に指摘", "甘い評価はしない。改善方向も必ず示す"] },
          { title: "図面・プレゼン", items: ["配置図・平面図・立面図・断面図のレビュー", "プレゼンシートの構成・情報の優先順位", "「伝わるか」「読まれるか」の視点"] },
          { title: "指導方針", items: ["「何を考えさせるか」重視の指導法", "生徒がハマりやすい罠の事前防止", "生徒の自走を促す問いの投げ方"] }
        ],
        examples: ["今年のテーマをどう解釈すべき？", "このコンセプトに審査員視点でフィードバックを", "プレゼンシートの構成を見てほしい"],
        prompt: "あなたは建築コンペの外部コーチ「十六夜 昴（いざよい すばる）」です。\n\n設定：\n- 専門：建築設計・コンペ指導（住宅設計・地域建築・プレゼン表現）\n- 経歴：設計事務所出身。建築甲子園・各種高校生建築コンペの審査経験あり。\n- 口調：歯に衣着せぬ師匠型。問題があれば直球で指摘。ただし前に進める指摘をする。\n\n設計評価の視点（優先順）：\n1. テーマとズレていないか\n2.「なぜここか」が明確か\n3. 住宅として成立しているか\n4. 独自性があるか\n5. 表現が伝わるか\n\n出力ルール：\n- 問題点は直球。改善策もセットで出す\n- 一人称は「俺」または「十六夜」\n- 簡潔・論理的・無駄な感情表現なし"
      }
    };

    // ===== Render Sidebar =====
    function renderSkillList() {
      const list = document.getElementById("skillList");
      for (const [id, skill] of Object.entries(SKILLS)) {
        const btn = document.createElement("button");
        btn.className = "skill-btn";
        btn.dataset.id = id;
        btn.style.setProperty("--active-color", skill.color);
        btn.innerHTML = `
          <div class="skill-icon">${skill.icon}</div>
          <div class="skill-info">
            <div class="skill-name">${skill.name}</div>
            <div class="skill-subtitle">${skill.subtitle}</div>
          </div>
        `;
        btn.onclick = () => selectSkill(id);
        list.appendChild(btn);
      }
    }

    // ===== Select Skill =====
    function selectSkill(id) {
      const skill = SKILLS[id];

      // Update sidebar
      document.querySelectorAll(".skill-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.id === id);
      });

      // Build detail view
      const main = document.getElementById("mainArea");
      main.innerHTML = `
        <div class="skill-detail visible">
          <div class="detail-header">
            <div class="detail-header-icon">${skill.icon}</div>
            <div>
              <h2>${skill.name}</h2>
              <p>${skill.subtitle} ─ ${skill.description}</p>
            </div>
            <div class="detail-actions">
              <button class="action-btn primary" onclick="copyPrompt('${id}')">
                📋 プロンプトをコピー
              </button>
              <a class="action-btn secondary" href="https://claude.ai" target="_blank" rel="noopener">
                Claude.ai を開く ↗
              </a>
            </div>
          </div>

          <div class="card-grid">
            ${skill.capabilities.map(cap => `
              <div class="card">
                <h3>${cap.title}</h3>
                <ul>${cap.items.map(item => `<li>${item}</li>`).join("")}</ul>
              </div>
            `).join("")}

            <div class="card full-width">
              <h3>💬 こんな質問ができます</h3>
              <div class="example-questions">
                ${skill.examples.map(q => `
                  <span class="example-q" onclick="copyText('${q.replace(/'/g, "\\'")}')">${q}</span>
                `).join("")}
              </div>
            </div>
          </div>
        </div>
      `;
      main.scrollTop = 0;
    }

    // ===== Copy Functions =====
    function copyPrompt(skillId) {
      const skill = SKILLS[skillId];
      navigator.clipboard.writeText(skill.prompt).then(() => {
        showToast("プロンプトをコピーしました - Claude.ai に貼り付けてください");
      });
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast("質問をコピーしました");
      });
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    // Init
    renderSkillList();
  </script>
</body>
</html>
